name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to HuggingFace Space
        env:
          # Using your specific secret name
          HF_TOKEN: ${{ secrets.HF_TOKENG }} 
        run: |
          git config --global user.email "dharnilotpal31@gmail.com"
          git config --global user.name "nilotpaldhar2004"

          # Use the Token directly in the clone URL to bypass the password prompt
          git clone https://nilotpaldhar2004:${HF_TOKEN}@huggingface.co/spaces/nilotpaldhar2004/Deep-Learning-for-Skin-Lesion-Classification hf_space

          # Copy app files from your GitHub repo to the cloned space folder
          cp main.py hf_space/
          cp index.html hf_space/
          cp requirements.txt hf_space/
          
          # IMPORTANT: HuggingFace MUST see the name 'Dockerfile' to build.
          # We take your file 'Docker' and rename it during the copy.
          cp Docker hf_space/Dockerfile 

          # Copy model files if they exist
          [ -f classes.npy ] && cp classes.npy hf_space/
          [ -f best_resnet50_skin.pth ] && cp best_resnet50_skin.pth hf_space/

          cd hf_space
          git add .
          
          # Commit and Push
          git diff --cached --quiet || git commit -m "Auto deploy from GitHub: version 3.0.0"
          
          # Re-verify the remote URL with the token before pushing
          git remote set-url origin https://nilotpaldhar2004:${HF_TOKEN}@huggingface.co/spaces/nilotpaldhar2004/Deep-Learning-for-Skin-Lesion-Classification
          git push origin main
